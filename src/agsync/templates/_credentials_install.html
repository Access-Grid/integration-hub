{% if error %}
  <span class="err inline-err">{{ error }}</span>
{% else %}
  <div class="install-cell">
    <div class="qr">{{ qr_svg | safe }}</div>
    <div class="install-link">
      <a href="{{ url }}" target="_blank" rel="noopener">{{ url }}</a>
      <button type="button"
              class="copy-btn"
              data-url="{{ url }}"
              data-copy-label="{{ t('credentials.copy') }}"
              data-copied-label="{{ t('credentials.copied') }}"
              onclick="navigator.clipboard.writeText(this.dataset.url); this.textContent=this.dataset.copiedLabel; setTimeout(()=>this.textContent=this.dataset.copyLabel, 1500);">
        {{ t('credentials.copy') }}
      </button>
    </div>
  </div>
{% endif %}
