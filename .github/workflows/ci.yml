name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src

      - name: Smoke import test
        env:
          AG_SYNC_ENCRYPTION_KEY: ZHVtbXktZHVtbXktZHVtbXktZHVtbXktZHVtbXktZHVtbXk=
        run: |
          agsync --version
          python -c "from agsync.server import create_app; create_app()"
          python -c "from agsync.lib.pacs import available_pacs; assert {d.vendor for d in available_pacs()} == {'avigilon','lenel'}"
